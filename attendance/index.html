<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Trading Pvt. Ltd. — Attendance</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">WT</div>
      <div class="brand-text">
        <h1>World Trading <span>Pvt. Ltd.</span></h1>
        <p>Staff Attendance</p>
      </div>
    </div>
    <div class="office-hours">
      <span class="dot"></span> Office hours <strong>10:00 AM – 6:00 PM</strong>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="daily">Daily</button>
    <button class="tab" data-tab="monthly">Monthly report</button>
  </nav>

  <!-- ============ DAILY ============ -->
  <main id="tab-daily" class="tab-panel active">
    <div class="toolbar">
      <div class="date-nav">
        <button id="prevDay" class="icon-btn" title="Previous day">‹</button>
        <input type="date" id="dayPicker" />
        <button id="nextDay" class="icon-btn" title="Next day">›</button>
        <button id="todayBtn" class="ghost-btn">Today</button>
        <span id="npDate" class="np-date" title="Nepali (Bikram Sambat) date"></span>
      </div>
      <div id="daySummary" class="summary"></div>
    </div>

    <div id="staffList" class="staff-list">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <!-- ============ MONTHLY ============ -->
  <main id="tab-monthly" class="tab-panel">
    <div class="toolbar">
      <div class="date-nav">
        <input type="month" id="monthPicker" />
        <button id="exportBtn" class="ghost-btn">⬇ Export CSV</button>
      </div>
    </div>
    <div id="monthlyReport" class="report">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
